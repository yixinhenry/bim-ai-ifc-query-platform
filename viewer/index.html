<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BIM AI Viewer</title>
  <style>
    html, body, #viewer { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { background: #eef1f4; font: 14px system-ui, sans-serif; }
    #message, #selection { position: absolute; z-index: 2; left: 12px; padding: 8px 10px; background: #fff; border: 1px solid #d6dbe1; border-radius: 4px; }
    #message { top: 12px; }
    #selection { top: 52px; max-width: calc(100% - 24px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <div id="message">Loading IFC...</div>
  <div id="selection" hidden></div>

  <script type="module">
    import * as OBC from "https://esm.sh/@thatopen/components@2.4.10?bundle";
    import * as OBF from "https://esm.sh/@thatopen/components-front@2.4.10?bundle";

    const message = document.getElementById("message");
    const selection = document.getElementById("selection");
    const container = document.getElementById("viewer");
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get("project_id");
    const modelVersion = params.get("v") || "unknown";
    message.textContent = `Loading IFC (${modelVersion})...`;

    async function loadModel() {
      if (!projectId) throw new Error("Missing project_id");

      const components = new OBC.Components();
      const worlds = components.get(OBC.Worlds);
      const world = worlds.create();
      world.scene = new OBC.SimpleScene(components);
      world.renderer = new OBC.SimpleRenderer(components, container);
      world.camera = new OBC.SimpleCamera(components);
      components.init();
      world.scene.setup();

      const grids = components.get(OBC.Grids);
      grids.create(world);

      const loader = components.get(OBC.IfcLoader);
      await loader.setup();
      loader.settings.webIfc.COORDINATE_TO_ORIGIN = true;

      const raycasters = components.get(OBC.Raycasters);
      raycasters.get(world);
      const highlighter = components.get(OBF.Highlighter);
      highlighter.setup({ world });

      const response = await fetch(`/model?project_id=${encodeURIComponent(projectId)}&v=${encodeURIComponent(params.get("v") || "")}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`IFC request failed: ${response.status}`);
      const data = new Uint8Array(await response.arrayBuffer());
      const model = await loader.load(data);
      world.scene.three.add(model);
      await world.camera.controls.fitToSphere(model, true);

      highlighter.events.select.onHighlight.add(async (modelIdMap) => {
        const fragments = components.get(OBC.FragmentsManager);
        const selected = [];
        for (const [modelId, localIds] of Object.entries(modelIdMap)) {
          const fragmentModel = fragments.list.get(modelId);
          if (!fragmentModel) continue;
          selected.push(...await fragmentModel.getItemsData([...localIds]));
        }
        const item = selected[0];
        const stepId = Number(item?.expressID ?? item?.expressId ?? item?.localId ?? item?.id);
        if (!Number.isInteger(stepId)) return;

        const saved = await fetch("/selection", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ project_id: Number(projectId), step_id: stepId }),
        });
        if (!saved.ok) return;
        const entity = await saved.json();
        selection.hidden = false;
        selection.textContent = `Selected: ${entity.ifc_type} #${entity.step_id}${entity.name ? ` — ${entity.name}` : ""}`;
      });

      message.textContent = `Loaded IFC (${modelVersion})`;
      setTimeout(() => message.remove(), 1500);
    }

    loadModel().catch((error) => {
      message.textContent = `Viewer failed: ${error.message}`;
      console.error(error);
    });
  </script>
</body>
</html>
