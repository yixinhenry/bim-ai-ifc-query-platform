<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BIM AI Viewer</title>
  <style>
    html, body, #viewer { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { background: #eef1f4; font: 14px system-ui, sans-serif; }
    #message { position: absolute; z-index: 2; top: 12px; left: 12px; padding: 8px 10px; background: #fff; border: 1px solid #d6dbe1; border-radius: 4px; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <div id="message">Loading IFC...</div>

  <script type="module">
    import * as OBC from "https://esm.sh/@thatopen/components@2.4.10?bundle";

    const message = document.getElementById("message");
    const container = document.getElementById("viewer");
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get("project_id");
    const modelVersion = params.get("v") || "unknown";
    message.textContent = `Loading IFC (${modelVersion})...`;

    async function loadModel() {
      if (!projectId) throw new Error("Missing project_id");

      const components = new OBC.Components();
      const worlds = components.get(OBC.Worlds);
      const world = worlds.create();
      world.scene = new OBC.SimpleScene(components);
      world.renderer = new OBC.SimpleRenderer(components, container);
      world.camera = new OBC.SimpleCamera(components);
      components.init();
      world.scene.setup();

      const grids = components.get(OBC.Grids);
      grids.create(world);

      const loader = components.get(OBC.IfcLoader);
      await loader.setup();
      loader.settings.webIfc.COORDINATE_TO_ORIGIN = true;

      const response = await fetch(`/model?project_id=${encodeURIComponent(projectId)}&v=${encodeURIComponent(params.get("v") || "")}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`IFC request failed: ${response.status}`);
      const data = new Uint8Array(await response.arrayBuffer());
      const model = await loader.load(data);
      world.scene.three.add(model);
      await world.camera.controls.fitToSphere(model, true);
      message.textContent = `Loaded IFC (${modelVersion})`;
      setTimeout(() => message.remove(), 1500);
    }

    loadModel().catch((error) => {
      message.textContent = `Viewer failed: ${error.message}`;
      console.error(error);
    });
  </script>
</body>
</html>
